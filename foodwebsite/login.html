<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录/注册 - 寻味</title>
    <link rel="stylesheet" href="css/common.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(230, 126, 34, 0.1), rgba(241, 196, 15, 0.1)),
                        url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=1920') center/cover;
            padding: var(--space-lg);
        }
        
        .auth-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            max-width: 900px;
            width: 100%;
            background: white;
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
        }
        
        .auth-left {
            padding: var(--space-2xl);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .auth-logo {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            margin-bottom: var(--space-xl);
        }
        
        .auth-logo .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
        }
        
        .auth-logo span {
            font-size: var(--font-size-xl);
            font-weight: 700;
            color: var(--primary);
        }
        
        .auth-left h2 {
            font-size: var(--font-size-2xl);
            margin-bottom: var(--space-sm);
        }
        
        .auth-left p {
            color: var(--text-secondary);
            margin-bottom: var(--space-xl);
        }
        
        .auth-tabs {
            display: flex;
            gap: var(--space-lg);
            margin-bottom: var(--space-xl);
            border-bottom: 2px solid var(--border-color);
        }
        
        .auth-tab {
            padding: var(--space-sm) 0;
            font-size: var(--font-size-lg);
            font-weight: 600;
            color: var(--text-light);
            position: relative;
            transition: color 0.3s ease;
        }
        
        .auth-tab:hover {
            color: var(--text-secondary);
        }
        
        .auth-tab.active {
            color: var(--primary);
        }
        
        .auth-tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--primary);
        }
        
        .auth-form {
            display: none;
        }
        
        .auth-form.active {
            display: block;
        }
        
        .form-group {
            margin-bottom: var(--space-md);
        }
        
        .form-label {
            display: block;
            margin-bottom: var(--space-xs);
            font-size: var(--font-size-sm);
            color: var(--text-secondary);
        }
        
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: var(--font-size-md);
            transition: all 0.3s ease;
        }
        
        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(230, 126, 34, 0.1);
        }
        
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-lg);
            font-size: var(--font-size-sm);
        }
        
        .remember-me {
            display: flex;
            align-items: center;
            gap: var(--space-xs);
            color: var(--text-secondary);
            cursor: pointer;
        }
        
        .remember-me input {
            width: 16px;
            height: 16px;
            accent-color: var(--primary);
        }
        
        .forgot-password {
            color: var(--primary);
        }
        
        .forgot-password:hover {
            text-decoration: underline;
        }
        
        .btn-submit {
            width: 100%;
            padding: 14px;
            font-size: var(--font-size-md);
            font-weight: 600;
        }
        
        .auth-divider {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            margin: var(--space-lg) 0;
            color: var(--text-light);
            font-size: var(--font-size-sm);
        }
        
        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }
        
        .social-login {
            display: flex;
            gap: var(--space-md);
        }
        
        .social-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-sm);
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: var(--font-size-sm);
            transition: all 0.3s ease;
        }
        
        .social-btn:hover {
            background: var(--bg-primary);
            border-color: var(--primary);
        }
        
        .auth-right {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: var(--space-2xl);
            color: white;
            text-align: center;
        }
        
        .auth-illustration {
            font-size: 120px;
            margin-bottom: var(--space-lg);
        }
        
        .auth-right h3 {
            font-size: var(--font-size-xl);
            margin-bottom: var(--space-sm);
        }
        
        .auth-right p {
            opacity: 0.9;
            line-height: 1.8;
        }
        
        .auth-features {
            margin-top: var(--space-xl);
            display: flex;
            flex-direction: column;
            gap: var(--space-md);
        }
        
        .feature-item {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            font-size: var(--font-size-sm);
        }
        
        .feature-item::before {
            content: '✓';
            width: 20px;
            height: 20px;
            background: rgba(255,255,255,0.2);
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }
        
        @media (max-width: 768px) {
            .auth-container {
                grid-template-columns: 1fr;
            }
            
            .auth-right {
                display: none;
            }
            
            .auth-left {
                padding: var(--space-xl);
            }
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-left">
                <div class="auth-logo">
                    <div class="logo-icon">🍜</div>
                    <span>寻味</span>
                </div>
                
                <h2>欢迎回来</h2>
                <p>登录或注册，开启你的美食探索之旅</p>
                
                <div class="auth-tabs">
                    <button class="auth-tab active" onclick="switchTab('login')">登录</button>
                    <button class="auth-tab" onclick="switchTab('register')">注册</button>
                </div>
                
                <!-- 登录表单 -->
                <form class="auth-form active" id="loginForm">
                    <div class="form-group">
                        <label class="form-label">手机号/邮箱</label>
                        <input type="text" class="form-input" placeholder="请输入手机号或邮箱" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">密码</label>
                        <input type="password" class="form-input" placeholder="请输入密码" required>
                    </div>
                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox">
                            <span>记住我</span>
                        </label>
                        <a href="#" class="forgot-password">忘记密码？</a>
                    </div>
                    <button type="submit" class="btn btn-primary btn-submit">登录</button>
                </form>
                
                <!-- 注册表单 -->
                <form class="auth-form" id="registerForm">
                    <div class="form-group">
                        <label class="form-label">手机号</label>
                        <input type="tel" class="form-input" placeholder="请输入手机号" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">验证码</label>
                        <div style="display: flex; gap: var(--space-sm);">
                            <input type="text" class="form-input" placeholder="请输入验证码" style="flex: 1;" required>
                            <button type="button" class="btn btn-secondary" style="white-space: nowrap;">获取验证码</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">密码</label>
                        <input type="password" class="form-input" placeholder="请设置密码（6-20位）" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">确认密码</label>
                        <input type="password" class="form-input" placeholder="请再次输入密码" required>
                    </div>
                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" required>
                            <span>我已阅读并同意 <a href="#" style="color: var(--primary);">用户协议</a></span>
                        </label>
                    </div>
                    <button type="submit" class="btn btn-primary btn-submit">注册</button>
                </form>
                
                <div class="auth-divider">或使用以下方式</div>
                
                <div class="social-login">
                    <button class="social-btn">
                        <span>📱</span>
                        <span>微信登录</span>
                    </button>
                    <button class="social-btn">
                        <span>🔴</span>
                        <span>微博登录</span>
                    </button>
                </div>
            </div>
            
            <div class="auth-right">
                <div class="auth-illustration">🍜</div>
                <h3>发现城市美味</h3>
                <p>加入寻味，和百万美食爱好者一起<br>探索城市里的美味惊喜</p>
                <div class="auth-features">
                    <div class="feature-item">发现身边好店</div>
                    <div class="feature-item">分享探店体验</div>
                    <div class="feature-item">收藏心仪店铺</div>
                    <div class="feature-item">获取专属推荐</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 切换登录/注册标签
        function switchTab(tab) {
            const tabs = document.querySelectorAll('.auth-tab');
            const forms = document.querySelectorAll('.auth-form');
            
            tabs.forEach(t => t.classList.remove('active'));
            forms.forEach(f => f.classList.remove('active'));
            
            if (tab === 'login') {
                tabs[0].classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                tabs[1].classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
        }
        
        // 表单提交
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('登录成功！');
            window.location.href = 'index.html';
        });
        
        document.getElementById('registerForm').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('注册成功！');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
